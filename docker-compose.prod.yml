# Production stack for the EC2 server. Local dev uses docker-compose.yml.
#
# Deploys come from GHCR via scripts/deploy.sh (run by GitHub Actions on push
# to main, or manually). IMAGE_TAG (sha-<commit>) is passed in the environment
# by deploy.sh — it is NOT read from .env.production.
#
# Usage (on the server, from /home/ubuntu/apps/amen-circle):
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d
#
# --env-file matters: it lets the ${POSTGRES_PASSWORD} interpolation below
# read .env.production (compose only auto-reads a file literally named .env).
# Every compose command against this file needs the flag, including exec.
#
# Requires .env.production (chmod 600, never committed) containing the app
# runtime env plus POSTGRES_PASSWORD, which must match the password inside
# DATABASE_URL (postgresql://postgres:<password>@db:5432/amen_circle).
services:
  app:
    image: ghcr.io/iphren/amen-circle:${IMAGE_TAG:-latest}
    # Emergency fallback only — compose uses the image above when it exists
    # and builds here only when it is absent (e.g. GHCR unreachable).
    build: .
    restart: unless-stopped
    env_file: .env.production
    logging: &log-cap
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      # Localhost-only: nginx on the host proxies amencircle.com here.
      # Keep in sync with deploy/nginx-amencircle.conf and scripts/deploy.sh.
      - "127.0.0.1:13001:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    # 17 to match Neon's major (17.10 at migration time) so its pg_dump
    # restores cleanly. Local dev (docker-compose.yml) still runs 16.
    image: postgres:17
    restart: unless-stopped
    logging: *log-cap
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: amen_circle
    ports:
      # Localhost-only, for admin over an SSH tunnel (psql, prisma db push).
      # Deliberately away from 5432/5433, which are taken/reserved on the host.
      - "127.0.0.1:15432:5432"
    volumes:
      - amen_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amen_circle"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  amen_pgdata_prod:
