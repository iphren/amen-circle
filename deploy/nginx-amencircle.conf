# Reference vhost for the shared EC2 server. Install as
# /etc/nginx/sites-available/amencircle.conf (+ symlink into sites-enabled),
# replacing REPLACE_WITH_SECRET with the real origin-verify secret — the same
# value stored in SSM at /amen-circle/origin-verify-secret and injected by
# CloudFront as the X-Origin-Verify origin custom header. Rotating the secret
# means updating BOTH the SSM parameter (then `terraform apply`) and this file.
# Never commit the real secret.
server {
    listen 80;
    server_name amencircle.com;

    # TLS terminates at CloudFront; only CloudFront knows this header, so
    # requests hitting the instance directly are rejected.
    if ($http_x_origin_verify != "REPLACE_WITH_SECRET") {
        return 403;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Next.js streams SSR responses; buffering would delay them.
        proxy_buffering off;
        proxy_read_timeout 60s;
        client_max_body_size 5m;
    }
}
