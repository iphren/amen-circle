services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: amen_circle
    ports:
      - "5433:5432"
    volumes:
      - amen_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amen_circle"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  amen_pgdata:
